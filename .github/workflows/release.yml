name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: ragnarok-linux-x86_64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: ragnarok-windows-x86_64.exe

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: ragnarok-macos-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: ragnarok-macos-arm64

    steps:
      - name: ⚔ Checkout
        uses: actions/checkout@v4

      - name: 🦀 Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 📦 Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: 🔨 Install musl tools (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y musl-tools

      - name: 🏗 Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: 📋 Rename artifact (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/ragnarok ${{ matrix.artifact }}

      - name: 📋 Rename artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/ragnarok.exe ${{ matrix.artifact }}

      - name: 🚀 Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
